<!DOCTYPE html>
<html>

    <head>
<title>Rock Paper Scissors</title>



<style>

body {
    background-color: rgb(25, 25, 25);
    color: white;
    font-family: Arial;
}
.title{
    font-size: 30px;
}
.move-icon{
    height:50px;
    

}

.move-button{
    background-color: transparent;
    border:3px solid white;
    padding: 22px;
    border-radius: 50px;
    cursor: pointer;
    margin-right:5px ;
}

.js-result{
    font-size: 25px;
    font-weight: bold;
    margin-top: 50px;
}



.picture-move{
    width: 60px;
}

.js-score{
    margin-top:50px;
}

.Reset-Score-button{
    font-family: Arial;
    font-size: 15px;
    padding: 8px 15px;
    cursor: pointer;
}

</style>

</head>
<body>
 <p class="title"><b>Rock Paper Scissors</b></p>
<button class="move-button"      onclick="
playGame('rock');
">
<img src="rock-paper-scissor-picture/rock-emoji.png"
class="move-icon">
</button>

<button class="move-button" onclick=" 
playGame('paper');
"><img src="rock-paper-scissor-picture/paper-emoji.png"
 class="move-icon">
</button>

<button class="move-button" onclick="
playGame('scissors');
"><img src="rock-paper-scissor-picture/scissors-emoji.png"
class="move-icon"
></button>

<p class="js-result"></p>
<p class="js-moves">
You
<img class="picture-move" src="rock-paper-scissor-picture/rock-emoji.png">
<img class="picture-move" src="rock-paper-scissor-picture/paper-emoji.png">
Computer
</p>
<p class="js-score"></p>




<button onclick="
 score.wins = 0;
 score.losses = 0;
 score.ties = 0;
 updateScoreElement();
" 
class="Reset-Score-button"
>Reset Score</button>

<script>

let score = JSON.parse(localStorage.getItem('score')) ||{
    wins:0,
    losses:0,
    ties:0
}

updateScoreElement();


 function pickComputerMove(){

const randomNumber = Math.random();
 let computerMove = '';
 if (randomNumber >= 0 && randomNumber < 1 / 3){
    computerMove = 'rock';
 } else if (randomNumber >= 1/3 && randomNumber < 2/3){
    computerMove = 'paper';
 } else if(randomNumber >=2/3 && randomNumber < 1 ){
    computerMove = 'scissors';
 }
  return computerMove;
 }



function playGame(playerMove){
  
const computerMove = pickComputerMove();
let result = '';

if ( playerMove === 'scissors'){

if (computerMove === 'rock') {
    result = 'you lose.';
}
if (computerMove === 'paper') {
    result = 'you win.';
}
if(computerMove === 'scissors'){
    result = 'Tie.';
}

}else if(playerMove === 'rock'){
if (computerMove === 'rock') {
    result = 'Tie.';
}
if (computerMove === 'paper') {
    result = 'you lose.';
}
if(computerMove === 'scissors'){
    result = 'you win.';

}
}else if(playerMove === 'paper'){
if (computerMove === 'rock') {
    result = 'you win.';
}
if (computerMove === 'paper') {
    result = 'Tie.';
}
if(computerMove === 'scissors'){
    result = 'you lose.';

}
}

if(result === 'you win.'){
    score.wins+=1;
}else if (result === 'you lose.') {
    score.losses += 1;
}else if (result === 'Tie.') {
    score.ties += 1;
}

localStorage.setItem('score',JSON.stringify(score));

updateScoreElement();

document.querySelector('.js-result')
.innerHTML = result;

document.querySelector('.js-moves')
.innerHTML = `You
<img class="picture-move" src="rock-paper-scissor-picture/${playerMove}-emoji.png">
<img class="picture-move" src="rock-paper-scissor-picture/${computerMove}-emoji.png">
Computer`;
}

function updateScoreElement(){
  document.querySelector('.js-score')
.innerHTML = `wins:${score.wins},losses:${score.losses},Tie:${score.ties}`;
  
}

</script>

    </body>
</html>
